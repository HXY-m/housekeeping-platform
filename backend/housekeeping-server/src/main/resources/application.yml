spring:
  application:
    name: housekeeping-server
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:housekeeping_platform}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 20MB

server:
  port: 8080

app:
  cors:
    allowed-origins:
      - http://localhost:5173
  security:
    jwt-secret: ${JWT_SECRET:housekeeping-platform-jwt-secret-key-change-me-2026-03-27-housekeeping}
    jwt-expire-hours: ${JWT_EXPIRE_HOURS:12}
  file:
    upload-dir: ./uploads
    public-url-prefix: /uploads
    max-image-size: 5242880
    max-attachment-size: 10485760

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

knife4j:
  enable: true
  setting:
    language: zh_cn
